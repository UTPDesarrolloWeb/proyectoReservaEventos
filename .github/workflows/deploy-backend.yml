name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'microservicios/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  ACR_REGISTRY: eventlyregistry24886.azurecr.io
  ACR_NAME: eventlyregistry24886
  RESOURCE_GROUP: evently-final-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - evento-service
          - reserva-service
          - pago-service
          - notificacion-service
          - admin-service
          - two-factor-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ matrix.service }}:latest \
            ./microservicios/${{ matrix.service }}
          docker push ${{ env.ACR_REGISTRY }}/${{ matrix.service }}:latest

      - name: Log in to Azure (for Container App update)
        uses: azure/login@v1
        continue-on-error: true
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        continue-on-error: true
        with:
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ matrix.service }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_REGISTRY }}/${{ matrix.service }}:latest

name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'microservicios/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - evento-service
          - reserva-service
          - pago-service
          - notificacion-service
          - admin-service
          - two-factor-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Build and Push Docker Image
        run: |
          REGISTRY="${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io"
          IMAGE_NAME="${{ matrix.service }}"
          TAG="latest"
          
          # Build the Docker container using the service context
          docker build -t $REGISTRY/$IMAGE_NAME:$TAG ./microservicios/${{ matrix.service }}
          docker push $REGISTRY/$IMAGE_NAME:$TAG

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          containerAppName: ${{ matrix.service }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}:latest

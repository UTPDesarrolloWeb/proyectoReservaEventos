spring.application.name=pago-service
server.port=8084

# DataSource configuration mapped from environment
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Feign configuration
spring.cloud.openfeign.client.config.default.connect-timeout=10000
spring.cloud.openfeign.client.config.default.read-timeout=30000

# Stripe configuration
stripe.secret-key=${STRIPE_SECRET_KEY:tu_stripe_secret_key_aqui}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:tu_stripe_webhook_secret_aqui}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:4200/reservas?payment_status=success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:4200/reservas?payment_status=failure}

# Microservices URLs
auth.service.url=${AUTH_SERVICE_URL:http://auth-service:8081}
reserva.service.url=${RESERVA_SERVICE_URL:http://reserva-service:8083}
evento.service.url=${EVENTO_SERVICE_URL:http://evento-service:8082}
notificacion.service.url=${NOTIFICACION_SERVICE_URL:http://notificacion-service:8085}


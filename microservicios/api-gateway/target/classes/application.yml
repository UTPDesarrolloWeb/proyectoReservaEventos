server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        # Evento Service
        - id: evento-service
          uri: http://evento-service:8082
          predicates:
            - Path=/api/eventos/**, /api/organizadores/**, /api/planes/**

        # Reserva Service
        - id: reserva-service
          uri: http://reserva-service:8083
          predicates:
            - Path=/api/reservas/**

        # Pago Service
        - id: pago-service
          uri: http://pago-service:8084
          predicates:
            - Path=/api/pagos/**

        # Admin Service
        - id: admin-service
          uri: http://admin-service:8086
          predicates:
            - Path=/api/admin/**

        # Notificacion Service
        - id: notificacion-service
          uri: http://notificacion-service:8085
          predicates:
            - Path=/api/notificaciones/**

        # WebSocket Notificaciones
        - id: websocket-route
          uri: ws://notificacion-service:8085
          predicates:
            - Path=/ws/**

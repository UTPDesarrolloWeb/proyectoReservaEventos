<nav class="navbar">

  <div class="nav-container">

    <!-- ========================= -->
    <!-- LOGO -->
    <!-- ========================= -->

    <a routerLink="/" class="logo">

      <div class="logo-icon">

        <i class="bi bi-calendar-event-fill"></i>

      </div>

      <div class="logo-text">

        <span class="logo-title">
          Evently
        </span>

        <small>
          Discover Amazing Events
        </small>

      </div>

    </a>

    <!-- ========================= -->
    <!-- MENÚ -->
    <!-- ========================= -->

    <div class="nav-links">

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">

        Inicio

      </a>

      <a routerLink="/eventos" routerLinkActive="active">

        Eventos

      </a>

      <a href="#">

        Categorías

      </a>

      <a href="#">

        Organizar

      </a>

    </div>

    <!-- ========================= -->
    <!-- BUSCADOR -->
    <!-- ========================= -->

    <div class="search-box">

      <i class="bi bi-search"></i>

      <input type="text" placeholder="Buscar eventos..." />

    </div>

    <!-- ========================= -->
    <!-- USUARIO -->
    <!-- ========================= -->

    <div class="nav-actions">

      <ng-container *ngIf="!isLoggedIn">

        <a routerLink="/login" class="btn-login">

          Iniciar sesión

        </a>

        <a routerLink="/register" class="btn btn-primary">

          Registrarse

        </a>

      </ng-container>

      <ng-container *ngIf="isLoggedIn">

        <a [routerLink]="getDashboardRoute()" class="btn-login">

          Mi Panel

        </a>

        <div class="user-pill">

          <div class="user-avatar">

            {{ userName.charAt(0).toUpperCase() }}

          </div>

          <div class="user-info">

            <span>

              {{ userName }}

            </span>

            <small>

              {{ userRol }}

            </small>

          </div>

        </div>

        <button class="btn btn-outline" (click)="logout()">

          Salir

        </button>

      </ng-container>

    </div>

    <!-- ========================= -->
    <!-- HAMBURGER -->
    <!-- ========================= -->

    <button class="hamburger" (click)="toggleMenu()">

      <i class="bi bi-list"></i>

    </button>

  </div>

  <!-- ========================= -->
  <!-- MOBILE MENU -->
  <!-- ========================= -->

  <div class="mobile-menu" [class.open]="menuOpen">

    <a routerLink="/" (click)="menuOpen=false">

      Inicio

    </a>

    <a routerLink="/eventos" (click)="menuOpen=false">

      Eventos

    </a>

    <a>

      Categorías

    </a>

    <a>

      Organizar

    </a>

    <ng-container *ngIf="!isLoggedIn">

      <a routerLink="/login" (click)="menuOpen=false">

        Iniciar sesión

      </a>

      <a routerLink="/register" class="btn btn-primary" (click)="menuOpen=false">

        Registrarse

      </a>

    </ng-container>

    <ng-container *ngIf="isLoggedIn">

      <a [routerLink]="getDashboardRoute()" (click)="menuOpen=false">

        Mi Panel

      </a>

      <button class="btn btn-outline" (click)="logout(); menuOpen=false">

        Salir

      </button>

    </ng-container>

  </div>

</nav>

<div class="page-wrapper">
  <div class="card">

    <div class="card-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </div>
      <h1 class="card-title">Iniciar Sesión</h1>
      <p class="card-description">Ingresa tus credenciales para continuar</p>
    </div>

    <div class="card-content">
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

        <div class="alert-error" *ngIf="error">{{ error }}</div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="tu@email.com" [(ngModel)]="email" name="email" required email />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="••••••••" [(ngModel)]="password" name="password" required />
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading" class="spinner-row">
            <span class="spinner"></span> Ingresando...
          </span>
        </button>

        <!-- Solo para desarrollo -->
        <button type="button" class="btn-demo" (click)="loginDemo()">
          [Entrar en modo demo (sin backend)]
        </button>

      </form>
    </div>

    <div class="card-footer">
      <p>¿No tienes cuenta?
        <a routerLink="/register" class="link">Regístrate aquí</a>
      </p>
    </div>
  </div>
</div>

<div class="page-wrapper">
  <div class="card">

    <div class="card-header">
      <div class="icon-circle">
        <span class="material-symbols-outlined" style="font-size: 28px;">person_add</span>
      </div>
      <h1 class="card-title">Crear Cuenta</h1>
      <p class="card-description">Únete a la plataforma de eventos</p>
    </div>

    <div class="card-content">
      <form (ngSubmit)="onSubmit()" #regForm="ngForm">

        <div class="alert-error" *ngIf="error">{{ error }}</div>

        <div class="field-row">
          <div class="field">
            <label for="nombre">Nombre</label>
            <input id="nombre" type="text" placeholder="Juan" [(ngModel)]="nombre" name="nombre" required />
          </div>
          <div class="field">
            <label for="apellido">Apellido</label>
            <input id="apellido" type="text" placeholder="Pérez" [(ngModel)]="apellido" name="apellido" required />
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="tu@email.com" [(ngModel)]="email" name="email" required email />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="••••••••" [(ngModel)]="password" name="password" required
            minlength="6" />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <input id="confirmPassword" type="password" placeholder="••••••••" [(ngModel)]="confirmPassword"
            name="confirmPassword" required />
        </div>

        <div class="field">
          <label>Tipo de Cuenta</label>
          <div class="radio-group">
            <label class="radio-option" [class.selected]="rol === 'CLIENTE'">
              <input type="radio" name="rol" value="CLIENTE" [(ngModel)]="rol" />
              <div class="radio-info">
                <span class="radio-title">Asistente</span>
                <span class="radio-desc">Comprar entradas y asistir a eventos</span>
              </div>
            </label>
            <label class="radio-option" [class.selected]="rol === 'ORGANIZADOR'">
              <input type="radio" name="rol" value="ORGANIZADOR" [(ngModel)]="rol" />
              <div class="radio-info">
                <span class="radio-title">Organizador</span>
                <span class="radio-desc">Crear y gestionar eventos</span>
              </div>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading || regForm.invalid">
          <span *ngIf="!loading">Registrarse</span>
          <span *ngIf="loading" class="spinner-row">
            <span class="spinner"></span> Creando cuenta...
          </span>
        </button>

      </form>

      <div class="divider-container">
        <span class="divider-text">O registrarse con Google</span>
      </div>

      <div class="google-btn-wrapper">
        <div id="google-btn-register"></div>
      </div>

      <p class="google-note">Al registrarte con Google se creará una cuenta como <strong>Asistente</strong>.</p>
    </div>

    <div class="card-footer">
      <p>¿Ya tienes cuenta?
        <a routerLink="/login" class="link">Inicia sesión aquí</a>
      </p>
    </div>

  </div>
</div>
